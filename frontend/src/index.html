<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      :root {
      }

      body {
        margin: 0;
        font-family: Helvetica, Arial, Sans-Serif;
      }

      img {
      }

      main {
        max-width: 800px;
        margin: 0 auto;
        text-align: center;
      }

      section {
        padding: 1em 0;
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Docutrack</title>
    <base href="/" />

    <link type="text/css" rel="stylesheet" href="main.css" />
  </head>
  <body>
    <main>
      <h1>Docutrack</h1>
      <section id="loginStatus">
        <p></p>
      </section>
      <section>
        <button id="loginBtn" hidden>Login</button>
        <button id="logoutBtn" hidden>Logout</button>
      </section>

      <br>

      <div id="loggedInOnly" hidden>
      <h1>My Files</h1>
      <div id="filesList">
        Loading...
      </div>

      <br>

      <h1>Request File</h1>
      <section>
        <label for="file_name">File Name:</label>
        <input size="50" id="file_name" type="text" />
      </section>
      <section>
        <button id="createRequestBtn">Request</button>
      </section>
      <span id="createRequestResult"></span>

      <br>
      </div>

      <div id="loggedOutOnly" hidden>
      <h1>Upload File</h1>
      <section>
        <label for="alias">Alias:</label>
        <input size="50" id="alias" type="text" />
      </section>
      <input type="file" id="file-selector">
      <section>
        <button id="uploadBtn">Upload</button>
      </section>
      <span id="uploadFileResult"></span>
      </div>

      <!--<h1>Download File</h1>
      <section>
        <button id="downloadBtn">Download</button>
      </section>
      <a id="downloadLink">Download</a>-->
    </main>
  </body>
</html>
